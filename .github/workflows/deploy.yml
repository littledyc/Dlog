name: Deploy Blog

on:
  push:
    branches: [source]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject secrets into config
        run: |
          sed -i "s/BAIDU_TOKEN_PLACEHOLDER/${{ secrets.BAIDU_TOKEN }}/" _config.yml
          sed -i "s/GITALK_CLIENT_SECRET_PLACEHOLDER/${{ secrets.GITALK_CLIENT_SECRET }}/" _config.redefine.yml

      - name: Generate static site
        run: npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: main
          publish_dir: ./public
          force_orphan: true
          cname: littledai.cn

      - name: Submit URLs to Baidu
        run: npx hexo-baidu-url-submit

      - name: Submit URLs via IndexNow (Bing + Yandex)
        run: |
          INDEXNOW_KEY="${{ secrets.INDEXNOW_KEY }}"
          if [ -f baidu_urls.txt ]; then
            URLS=$(head -100 baidu_urls.txt | jq -R -s -c 'split("\n") | map(select(length > 0))')
            curl -s -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json" \
              -d "{\"host\": \"littledai.cn\", \"key\": \"$INDEXNOW_KEY\", \"keyLocation\": \"https://littledai.cn/$INDEXNOW_KEY.txt\", \"urlList\": $URLS}"
          fi
